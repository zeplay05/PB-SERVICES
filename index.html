<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PB SERVICES - ร้านค้าออนไลน์คุณภาพเพื่อเกมเมอร์ 24 ชม.</title>
    <!-- Google Fonts: Prompt for Thai & Inter for general typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for sleek modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body style="background-color: #0b1120; margin: 0; padding: 0;">
    <div id="root">
      <!-- Premium Preloader (Visible during React initial load, automatically removed when React mounts) -->
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #020617; font-family: 'Prompt', 'Inter', sans-serif; position: fixed; top: 0; left: 0; width: 100%; z-index: 99999;">
        <div class="preloader-glow" style="filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.6)); animation: preloader-pulse 1.8s ease-in-out infinite; display: flex; align-items: center; justify-content: center;">
          <img src="/logo.png" style="width: 80px; height: 80px; object-fit: contain;" alt="PB SERVICES Logo" />
        </div>
        <div style="color: #e2e8f0; margin-top: 18px; font-size: 1.1rem; font-weight: 500; letter-spacing: 1px; text-shadow: 0 0 8px rgba(6, 182, 212, 0.3); animation: preloader-fade 1.8s ease-in-out infinite;">
          PB SERVICES กำลังโหลด...
        </div>
      </div>
      <style>
        @keyframes preloader-pulse {
          0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.5)); }
          50% { transform: scale(1.12); filter: drop-shadow(0 0 25px rgba(6, 182, 212, 0.9)); }
        }
        @keyframes preloader-fade {
          0%, 100% { opacity: 0.6; }
          50% { opacity: 1; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
